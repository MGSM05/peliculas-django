{% extends "base.html" %}

{% block content %}
<h2>Eliminar película</h2>
<p>¿Estás seguro de que quieres eliminar <strong>{{ pelicula.titulo }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'detalle_pelicula' pelicula.pk %}">Cancelar</a>
</form>
{% endblock content %}
